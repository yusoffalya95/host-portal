<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Guidelines Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 15px;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .category-header:hover {
            background: #f5f5f5;
            border-color: #bbb;
        }

        .category-name {
            font-weight: 500;
            font-size: 15px;
        }

        .category-count {
            font-size: 12px;
            color: #666;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .item {
            padding: 1rem;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin: 0 0 0.5rem 1rem;
            display: none;
        }

        .item.visible {
            display: block;
        }

        .item-title {
            font-weight: 500;
            color: #222;
            margin-bottom: 0.25rem;
            font-size: 15px;
        }

        .item-description {
            font-size: 13px;
            color: #666;
            margin: 0.25rem 0 0.75rem 0;
        }

        .item-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 0.75rem;
        }

        .brand-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .brand-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #e8f4f8;
            color: #0066cc;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            border: 0.5px solid #b3d9e8;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .button {
            padding: 6px 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .button-secondary {
            background: white;
            color: #2563eb;
            border: 1px solid #2563eb;
        }

        .button-secondary:hover {
            background: #f0f7ff;
        }

        .error {
            padding: 1rem;
            background: #fee;
            color: #c00;
            border: 1px solid #f99;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .calendar-container {
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .calendar-container iframe {
            width: 100%;
            height: 600px;
            border: none;
        }

        .empty-state {
            padding: 2rem;
            text-align: center;
            color: #666;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .filter-button {
            padding: 6px 12px;
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-button:hover {
            background: #f5f5f5;
            border-color: #999;
        }

        .filter-button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        #brand-filter {
            margin-bottom: 2rem;
        }

        #brand-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1rem 0.5rem;
            }
            
            .header h1 {
                font-size: 22px;
            }

            .calendar-container iframe {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Host Guidelines Portal</h1>
            <p>Access all guidelines, training materials, and schedules</p>
        </div>

        <div id="error-container"></div>
        <div id="loading" class="loading">Loading content...</div>

        <div id="brand-filter" style="display: none;">
            <p style="font-size: 14px; font-weight: 500; margin-bottom: 0.5rem;">Filter by Brand:</p>
            <div id="brand-buttons"></div>
        </div>

        <div id="documents-section" style="display: none;" class="section">
            <h2 class="section-title">📄 Documents & Guidelines</h2>
            <div id="documents-content"></div>
        </div>

        <div id="videos-section" style="display: none;" class="section">
            <h2 class="section-title">🎥 Video Training</h2>
            <div id="videos-content"></div>
        </div>

        <div class="section">
            <h2 class="section-title">📅 Schedule & Events</h2>
            <div class="calendar-container">
                <iframe 
                    src="https://calendar.google.com/calendar/embed?src=b085f82a437b7389a56b0ea57f5e932f72026b38aaa6ac31e836a20aa57e2f9f%40group.calendar.google.com&ctz=UTC"
                    title="Host Schedule Calendar">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '179bNmesliCntyAWnvteDbAzGYzkDgyuTcloURNyeaj0';
        let expandedCategory = null;
        let allDocuments = [];
        let selectedBrand = null;

        async function loadSheetData() {
            try {
                // Use CSV export URL for more reliable access
                const docCsvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
                const vidCsvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1747893854`;

                console.log('Fetching Documents from:', docCsvUrl);
                console.log('Fetching Videos from:', vidCsvUrl);

                // Fetch Documents
                const docRes = await fetch(docCsvUrl);
                if (!docRes.ok) throw new Error(`Documents fetch failed: ${docRes.status}`);
                const docCsv = await docRes.text();
                const documents = parseCSV(docCsv);

                console.log('Documents parsed:', documents);

                // Fetch Videos
                const vidRes = await fetch(vidCsvUrl);
                if (!vidRes.ok) throw new Error(`Videos fetch failed: ${vidRes.status}`);
                const vidCsv = await vidRes.text();
                const videos = parseCSV(vidCsv);

                console.log('Videos parsed:', videos);

                allDocuments = documents;
                document.getElementById('loading').style.display = 'none';

                // Extract unique brands
                const uniqueBrands = [...new Set(
                    documents
                        .filter(doc => doc.Brand)
                        .flatMap(doc => doc.Brand.split(',').map(b => b.trim()))
                )].sort();

                if (uniqueBrands.length > 0) {
                    setupBrandFilter(uniqueBrands);
                }

                if (documents.length > 0) {
                    renderDocuments(documents);
                    document.getElementById('documents-section').style.display = 'block';
                }

                if (videos.length > 0) {
                    renderVideos(videos);
                    document.getElementById('videos-section').style.display = 'block';
                }

                if (documents.length === 0 && videos.length === 0) {
                    document.getElementById('loading').innerHTML = 
                        '<div class="empty-state">No content added yet. Check back soon!</div>';
                    document.getElementById('loading').style.display = 'block';
                }

            } catch (err) {
                console.error('Error loading sheet:', err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-container').innerHTML = 
                    `<div class="error">Failed to load content. Error: ${err.message}<br><br>Make sure the Google Sheet is shared publicly and the sheet tabs are named "Documents" and "Videos".</div>`;
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const values = lines[i].split(',').map(v => v.trim());
                const row = {};
                headers.forEach((header, idx) => {
                    row[header] = values[idx] || '';
                });
                
                if (row.Category && row.Title) {
                    data.push(row);
                }
            }

            return data;
        }

        function setupBrandFilter(brands) {
            const buttonsDiv = document.getElementById('brand-buttons');
            let html = `<button class="filter-button active" onclick="filterByBrand(null)">All Brands</button>`;
            
            brands.forEach(brand => {
                html += `<button class="filter-button" onclick="filterByBrand('${brand}')">${brand}</button>`;
            });

            buttonsDiv.innerHTML = html;
            document.getElementById('brand-filter').style.display = 'block';
        }

        function filterByBrand(brand) {
            selectedBrand = brand;
            document.querySelectorAll('.filter-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const filtered = brand 
                ? allDocuments.filter(doc => doc.Brand && doc.Brand.includes(brand))
                : allDocuments;

            renderDocuments(filtered);
        }

        function groupByCategory(items) {
            return items.reduce((acc, item) => {
                if (!acc[item.Category]) {
                    acc[item.Category] = [];
                }
                acc[item.Category].push(item);
                return acc;
            }, {});
        }

        function renderDocuments(documents) {
            const grouped = groupByCategory(documents);
            let html = '';

            Object.entries(grouped).forEach(([category, items]) => {
                const categoryId = `doc-${category}`;
                html += `
                    <div class="category-header" onclick="toggleCategory('${categoryId}')">
                        <span class="category-name">
                            <span id="arrow-${categoryId}">▶</span> ${category}
                        </span>
                        <span class="category-count">${items.length}</span>
                    </div>
                    <div id="${categoryId}" class="category-content">
                `;

                items.forEach(item => {
                    const brands = item.Brand ? item.Brand.split(',').map(b => b.trim()) : [];
                    const brandHtml = brands.length > 0 
                        ? `<div class="brand-badges">${brands.map(b => `<span class="brand-badge">${b}</span>`).join('')}</div>`
                        : '';
                    
                    html += `
                        <div class="item">
                            <p class="item-title">${item.Title}</p>
                            ${brandHtml}
                            ${item.Description ? `<p class="item-description">${item.Description}</p>` : ''}
                            <p class="item-meta">Type: ${item['Document Type'] || 'PDF'}</p>
                            <div class="button-group">
                                <button class="button" onclick="openLink('${item['Document Link']}')">
                                    View Document
                                </button>
                                <button class="button button-secondary" onclick="downloadFile('${item['Document Link']}')">
                                    Download
                                </button>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            });

            document.getElementById('documents-content').innerHTML = html;
        }

        function renderVideos(videos) {
            const grouped = groupByCategory(videos);
            let html = '';

            Object.entries(grouped).forEach(([category, items]) => {
                const categoryId = `vid-${category}`;
                html += `
                    <div class="category-header" onclick="toggleCategory('${categoryId}')">
                        <span class="category-name">
                            <span id="arrow-${categoryId}">▶</span> ${category}
                        </span>
                        <span class="category-count">${items.length}</span>
                    </div>
                    <div id="${categoryId}" class="category-content">
                `;

                items.forEach(item => {
                    html += `
                        <div class="item">
                            <p class="item-title">${item.Title}</p>
                            ${item.Description ? `<p class="item-description">${item.Description}</p>` : ''}
                            ${item.Duration ? `<p class="item-meta">Duration: ${item.Duration}</p>` : ''}
                            <div class="button-group">
                                <button class="button" onclick="openLink('${item['Video Link']}')">
                                    Play Video
                                </button>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            });

            document.getElementById('videos-content').innerHTML = html;
        }

        function toggleCategory(categoryId) {
            const content = document.getElementById(categoryId);
            const items = content.querySelectorAll('.item');
            const arrow = document.getElementById(`arrow-${categoryId}`);

            const isExpanded = items[0].classList.contains('visible');

            items.forEach(item => {
                item.classList.toggle('visible');
            });

            arrow.textContent = isExpanded ? '▶' : '▼';
        }

        function openLink(url) {
            if (url && url.trim()) window.open(url, '_blank');
        }

        function downloadFile(url) {
            if (url && url.trim()) {
                const link = document.createElement('a');
                link.href = url;
                link.download = '';
                link.click();
            }
        }

        window.addEventListener('load', loadSheetData);
    </script>
</body>
</html>
